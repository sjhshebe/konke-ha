name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  test:
    name: Test and quality gate
    runs-on: ubuntu-latest
    env:
      PYTHONPYCACHEPREFIX: /tmp/konke-pycache

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install test dependencies
        run: python -m pip install -r requirements-test.txt

      - name: Run unit tests
        shell: bash
        run: |
          set +e
          python -m pytest tests/components/konke 2>&1 | tee /tmp/konke-pytest.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            python - <<'PY'
          from pathlib import Path

          text = Path("/tmp/konke-pytest.log").read_text(errors="replace")
          tail = "\n".join(text.splitlines()[-80:])
          tail = tail.replace("%", "%25").replace("\n", "%0A").replace("\r", "%0D")
          print(f"::error title=pytest failed::{tail}")
          PY
          fi
          exit "$status"

      - name: Compile integration
        run: python -m compileall -q custom_components/konke

      - name: Run quality gate
        run: python scripts/quality_gate.py

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate HACS
        uses: hacs/action@main
        with:
          category: integration

  hassfest:
    name: hassfest validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate hassfest
        uses: home-assistant/actions/hassfest@master
