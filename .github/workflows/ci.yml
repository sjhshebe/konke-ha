name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  test:
    name: Test and quality gate
    runs-on: ubuntu-latest
    env:
      PYTHONPYCACHEPREFIX: /tmp/konke-pycache

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Compile integration
        run: python -m compileall -q custom_components/konke

      - name: Run quality gate
        run: python scripts/quality_gate.py
